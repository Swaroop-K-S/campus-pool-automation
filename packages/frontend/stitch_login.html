<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CampusPool Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation -->
<header class="w-full flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-6 py-4 lg:px-20">
<div class="flex items-center gap-2 text-primary">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined">school</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">CampusPool</h2>
</div>
<div class="flex items-center gap-4">
<span class="hidden md:inline text-slate-500 dark:text-slate-400 text-sm">Need help?</span>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-semibold hover:bg-primary/90 transition-colors">
                Support
            </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full -z-10 opacity-40">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-[450px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-800 p-8 md:p-10">
<!-- Card Header -->
<div class="flex flex-col items-center mb-8">
<div class="size-12 bg-primary/10 dark:bg-primary/20 rounded-xl flex items-center justify-center text-primary mb-4">
<span class="material-symbols-outlined text-3xl">verified_user</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm text-center">Enter your credentials to access the placement portal</p>
</div>
<!-- Login Form -->
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">
                        Institutional Email
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="email" placeholder="name@university.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">
                            Password
                        </label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary h-4 w-4" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-3 px-4 bg-primary text-white rounded-lg font-bold hover:bg-primary/90 focus:ring-4 focus:ring-primary/20 transition-all shadow-lg shadow-primary/20" type="submit">
                    Sign In to Portal
                </button>
</form>
<!-- Footer Section -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Trusted by 500+ Institutions worldwide
                </p>
<div class="flex justify-center gap-6 mt-4 opacity-50 grayscale">
<div class="h-6 w-20 bg-slate-200 dark:bg-slate-700 rounded-md" data-alt="University partner logo placeholder"></div>
<div class="h-6 w-24 bg-slate-200 dark:bg-slate-700 rounded-md" data-alt="Corporate partner logo placeholder"></div>
</div>
</div>
</div>
</main>
<!-- Page Footer -->
<footer class="w-full py-6 px-6 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500">
            © 2024 CampusPool Inc. All rights reserved. | <a class="hover:text-primary underline" href="#">Privacy Policy</a> | <a class="hover:text-primary underline" href="#">Terms of Service</a>
</p>
</footer>
</body></html>
