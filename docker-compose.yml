# version: '3.8'  # obsolete — removed

services:
  mongodb:
    image: mongo:latest
    container_name: campuspool-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - campuspool_net
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: campuspool-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - campuspool_net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: campuspool-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGODB_URI=mongodb://mongodb:27017/campuspool
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=campuspool-docker-compose-secret-key-32chars
      - LOCAL_AI_URL=http://ollama:11434/api/generate
      - FRONTEND_URL=http://localhost
      - BACKEND_URL=http://localhost:8080
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      - mongodb
      - redis
      - ollama
      - qdrant
    networks:
      - campuspool_net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: campuspool-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campuspool_net
    restart: unless-stopped

  # ── Qdrant Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: campuspool-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - campuspool_net
    restart: unless-stopped

  # ── Local AI (Ollama) — GPU-accelerated ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: campuspool-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - campuspool_net
    restart: unless-stopped
    # ── NVIDIA GPU Passthrough (RTX 5060 Laptop — 8 GB VRAM) ─────────────────
    # Docker Desktop on Windows + WSL2 bridges the NVIDIA driver automatically.
    # No nvidia-container-toolkit install required on the host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Pull gemma2:2b and nomic-embed-text on first boot. Weights live in ollama_data volume —
    # no re-download on restart. GPU inference: ~2-3s vs ~25s on CPU.
    entrypoint: ["/bin/sh", "-c",
      "ollama serve & sleep 5 && ollama pull gemma2:2b && ollama pull nomic-embed-text && wait"
    ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # generous — model pull can take a few minutes

volumes:
  mongodb_data:
  redis_data:
  ollama_data:             # persists the downloaded model weights
  qdrant_data:             # persists the vector embeddings

networks:
  campuspool_net:
    driver: bridge
